name: Network Security System - CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ============================================================
  # JOB 1: CONTINUOUS INTEGRATION
  # Build the Docker image and push it to AWS ECR
  # ============================================================
  integration:
    name: CI - Build & Push Docker Image to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag & Push Docker Image to ECR
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ECR_LOGIN_URI }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
        run: |
          # Strip any accidental whitespace/newlines from secret values
          REGISTRY=$(echo "${ECR_REGISTRY}" | tr -d '[:space:]')
          REPOSITORY=$(echo "${ECR_REPOSITORY}" | tr -d '[:space:]')
          IMAGE_URI="${REGISTRY}/${REPOSITORY}:latest"

          echo "Building image..."
          docker build -t "${IMAGE_URI}" .

          echo "Pushing image to ECR..."
          docker push "${IMAGE_URI}"

  # ============================================================
  # JOB 2: CONTINUOUS DELIVERY
  # Pull the latest image on EC2 and run it as a container
  # ============================================================
  deployment:
    name: CD - Deploy FastAPI App to AWS EC2
    needs: integration
    runs-on: self-hosted

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Latest Docker Image from ECR
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ECR_LOGIN_URI }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
        run: |
          REGISTRY=$(echo "${ECR_REGISTRY}" | tr -d '[:space:]')
          REPOSITORY=$(echo "${ECR_REPOSITORY}" | tr -d '[:space:]')
          IMAGE_URI="${REGISTRY}/${REPOSITORY}:latest"
          docker pull "${IMAGE_URI}"

      - name: Stop & Remove Existing Container (if running)
        run: |
          docker ps -q --filter "name=networksecurity" | grep -q . \
            && docker stop networksecurity && docker rm networksecurity \
            || echo "No existing container found. Skipping..."

      - name: Run FastAPI Container on EC2
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ECR_LOGIN_URI }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          MONGO_DB_URL: ${{ secrets.MONGO_DB_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          REGISTRY=$(echo "${ECR_REGISTRY}" | tr -d '[:space:]')
          REPOSITORY=$(echo "${ECR_REPOSITORY}" | tr -d '[:space:]')
          IMAGE_URI="${REGISTRY}/${REPOSITORY}:latest"

          docker run -d \
            --name networksecurity \
            --restart unless-stopped \
            -p 8080:8080 \
            -e MONGO_DB_URL="${MONGO_DB_URL}" \
            -e AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}" \
            -e AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}" \
            -e AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION}" \
            -e MLFLOW_TRACKING_URI="${MLFLOW_TRACKING_URI}" \
            -e MLFLOW_TRACKING_USERNAME="${MLFLOW_TRACKING_USERNAME}" \
            -e MLFLOW_TRACKING_PASSWORD="${MLFLOW_TRACKING_PASSWORD}" \
            "${IMAGE_URI}"
          echo "Container started. FastAPI at http://<EC2-PUBLIC-IP>:8080"

      - name: Clean Up Unused Docker Images
        run: docker image prune -f